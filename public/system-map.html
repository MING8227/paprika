<script>
  let mm;
  function setExpanded(node, val) {
    if (!node) return;
    node.payload = node.payload || {};
    node.payload.fold = val ? 0 : 1;
    if (node.children) node.children.forEach(c => setExpanded(c, val));
  }
  function expandAll() {
    if (!mm) return;
    setExpanded(mm.state.data, true);
    mm.renderData();
    mm.fit();
  }
  function collapseAll() {
    if (!mm) return;
    const root = mm.state.data;
    root.payload = root.payload || {};
    root.payload.fold = 0;
    if (root.children) root.children.forEach(c => setExpanded(c, false));
    mm.renderData();
    mm.fit();
  }
  document.addEventListener('DOMContentLoaded', () => {
    const { Transformer } = window.markmap;
    const { Markmap } = window.markmap;
    const md = document.getElementById('md').textContent;
    const transformer = new Transformer();
    const { root, features } = transformer.transform(md);
    const svg = document.getElementById('markmap');
    mm = Markmap.create(svg, { colorFreezeLevel: 2, initialExpandLevel: 1, maxWidth: 800 }, root);
  });
</script>
